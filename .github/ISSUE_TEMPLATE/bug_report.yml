name: Bug report
description: Reporte um problema tecnico, erro factual ou comportamento inesperado
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar. Nao inclua segredos, tokens, chaves ou dados privados.
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Como outra pessoa pode reproduzir o problema?
      placeholder: |
        1. Va para...
        2. Clique em...
        3. Veja o erro...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Logs, screenshots anonimizadas, links ou observacoes relevantes
